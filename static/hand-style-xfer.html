
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>VISION SYS — Hand Style Transfer</title>
<style>
@keyframes scan {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
@keyframes blink {
  0%,49%  { opacity: 1; }
  50%,100% { opacity: 0; }
}
@keyframes mode-in {
  from { transform: translateX(-12px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
@keyframes loading-sweep {
  0%   { left: -60%; }
  100% { left: 160%; }
}
@keyframes ripple {
  0%   { transform: scale(1);   opacity: 0.9; }
  100% { transform: scale(2.5); opacity: 0;   }
}

:root {
  --bg: #010508;
  --accent: #00e5ff;
  --accent2: #39ff14;
  --dim: rgba(0,229,255,0.22);
  --text: #6bb8c4;
  --text2: #9dd4de;
  --glow-c: 0 0 14px rgba(0,229,255,0.55);
  --glow-g: 0 0 14px rgba(57,255,20,0.55);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', 'Lucida Console', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

#wrapper {
  position: relative;
  display: inline-block;
  line-height: 0;
}

#output {
  display: block;
  max-width: 90vw;
  max-height: 82vh;
  border: 1px solid var(--dim);
  box-shadow: var(--glow-c), 0 0 60px rgba(0,229,255,0.06) inset;
}

video { display: none; }

/* scanlines */
.scanlines {
  position: absolute; inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
  );
  z-index: 5;
}
.scan-beam {
  position: absolute; left: 0; right: 0;
  height: 50px;
  background: linear-gradient(to bottom, transparent, rgba(0,229,255,0.035), transparent);
  pointer-events: none;
  animation: scan 5s linear infinite;
  z-index: 6;
}

/* corners */
.corner {
  position: absolute; width: 20px; height: 20px;
  pointer-events: none; z-index: 10;
}
.corner::before, .corner::after {
  content: ''; position: absolute;
  background: var(--accent);
  box-shadow: var(--glow-c);
}
.corner::before { width: 100%; height: 2px; }
.corner::after  { width: 2px; height: 100%; }
.corner-tl { top: -1px; left: -1px; }
.corner-tr { top: -1px; right: -1px; }
.corner-tr::before, .corner-tr::after { right: 0; }
.corner-bl { bottom: -1px; left: -1px; }
.corner-bl::before { bottom: 0; }
.corner-bl::after  { bottom: 0; }
.corner-br { bottom: -1px; right: -1px; }
.corner-br::before { right: 0; bottom: 0; }
.corner-br::after  { right: 0; bottom: 0; }

/* HUD top */
.hud-top {
  position: absolute; top: 10px; left: 12px; right: 12px;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none; z-index: 20;
}
.hud-title {
  font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--accent); text-shadow: var(--glow-c); line-height: 1.6;
}
.hud-sub {
  font-size: 8px; letter-spacing: 0.18em; color: var(--text); margin-top: 2px;
}
.status-dot {
  display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent2); box-shadow: var(--glow-g);
  animation: blink 1.1s step-end infinite; margin-right: 5px;
}
.info-panel {
  font-size: 8px; letter-spacing: 0.12em; color: var(--text);
  text-align: right; line-height: 1.8;
}

/* mode bar */
.mode-bar {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 5px; z-index: 20; pointer-events: none;
  white-space: nowrap;
}
.mode-chip {
  padding: 3px 9px; font-size: 8px; letter-spacing: 0.2em;
  text-transform: uppercase; border: 1px solid rgba(0,229,255,0.15);
  color: rgba(0,229,255,0.28); transition: all 0.25s ease;
}
.mode-chip.active {
  border-color: var(--chip-color, var(--accent));
  color: var(--chip-color, var(--accent));
  text-shadow: 0 0 10px var(--chip-color, var(--accent));
  box-shadow: 0 0 10px rgba(var(--chip-rgb, 0,229,255), 0.35),
              inset 0 0 10px rgba(var(--chip-rgb, 0,229,255), 0.1);
  animation: mode-in 0.3s ease-out;
}

/* loading */
.loading-overlay {
  position: absolute; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  z-index: 100; transition: opacity 0.6s ease;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-text {
  font-size: 10px; letter-spacing: 0.3em; color: var(--accent);
  text-shadow: var(--glow-c);
}
.loading-bar {
  width: 180px; height: 1px;
  background: rgba(0,229,255,0.12); position: relative; overflow: hidden;
}
.loading-bar::after {
  content: ''; position: absolute; top: 0; height: 100%;
  width: 60%; background: var(--accent); box-shadow: var(--glow-c);
  animation: loading-sweep 1.2s ease-in-out infinite;
}
.loading-note {
  font-size: 8px; letter-spacing: 0.2em; color: rgba(0,229,255,0.4);
}
</style>

<div id="wrapper">
  <canvas id="output" width="640" height="480"></canvas>
  <video id="input" playsinline></video>
  <div class="scanlines"></div>
  <div class="scan-beam"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="hud-top">
    <div>
      <div class="hud-title">VISION SYS v2.1</div>
      <div class="hud-sub"><span class="status-dot"></span><span id="hud-status">INITIALIZING</span></div>
    </div>
    <div class="info-panel" id="info-panel">HANDS: 0/2<br>L: --<br>R: --</div>
  </div>

  <div class="mode-bar" id="mode-bar"></div>

  <div class="loading-overlay" id="loading">
    <div class="loading-text">LOADING HAND TRACKING MODEL</div>
    <div class="loading-bar"></div>
    <div class="loading-note">MEDIAPIPE HANDS · CALIBRATING</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@magenta/image@0.2.1/dist/magentaimage.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ─── Modes ───────────────────────────────────────────────────────────────────
const MODES = [
  { id:'ORIGINAL', label:'ORIGINAL', color:'#00e5ff', rgb:'0,229,255' },
  { id:'WEBTOON',  label:'WEBTOON',  color:'#ff6b9d', rgb:'255,107,157' },
  { id:'MANGA',    label:'MANGA',    color:'#b0bec5', rgb:'176,190,197' },
  { id:'AI_ANIME', label:'AI ANIME', color:'#e040fb', rgb:'224,64,251' },
  { id:'CARTOON',  label:'CARTOON',  color:'#ff9f1c', rgb:'255,159,28' },
  { id:'SKETCH',   label:'SKETCH',   color:'#dceef2', rgb:'220,238,242' },
  { id:'NEON',     label:'NEON',     color:'#bf5fff', rgb:'191,95,255' },
  { id:'GLITCH',   label:'GLITCH',   color:'#ff006e', rgb:'255,0,110' },
];
let currentMode = 0;

// ─── State ───────────────────────────────────────────────────────────────────
const THUMB_TIP = 4, INDEX_TIP = 8;
const PINCH_THRESHOLD = 0.07, COOLDOWN = 900;
let lastPinchTime = 0;
let leftPinching = false, rightPinching = false;
let frameCount = 0;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('output');
const ctx      = canvas.getContext('2d', { willReadFrequently: true });
const video    = document.getElementById('input');
const loadingEl = document.getElementById('loading');
const statusEl  = document.getElementById('hud-status');
const infoEl    = document.getElementById('info-panel');
const modeBarEl = document.getElementById('mode-bar');

// ─── Mode bar ────────────────────────────────────────────────────────────────
function buildModeBar() {
  modeBarEl.innerHTML = '';
  MODES.forEach((m, i) => {
    const chip = document.createElement('div');
    chip.className = 'mode-chip' + (i === currentMode ? ' active' : '');
    chip.textContent = m.label;
    if (i === currentMode) {
      chip.style.setProperty('--chip-color', m.color);
      chip.style.setProperty('--chip-rgb', m.rgb);
    }
    modeBarEl.appendChild(chip);
  });
}
buildModeBar();

// ─── MediaPipe ───────────────────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});
hands.setOptions({
  maxNumHands: 2, modelComplexity: 1,
  minDetectionConfidence: 0.7, minTrackingConfidence: 0.5,
});
hands.onResults(onResults);

const cam = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 640, height: 480
});
cam.start().then(() => {
  loadingEl.classList.add('hidden');
  statusEl.textContent = 'TRACKING ACTIVE';
});

// ─── Main results callback ───────────────────────────────────────────────────
function onResults(results) {
  frameCount++;

  // Draw mirrored video frame
  ctx.save();
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  // Subtle vignette
  const vg = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.width*0.3,
    canvas.width/2, canvas.height/2, canvas.width*0.8
  );
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks?.length) {
    leftPinching = rightPinching = false;
    drawHint('양손을 카메라에 보여주세요   ·   PINCH = 모드 전환');
    infoEl.innerHTML = 'HANDS: 0/2<br>L: --<br>R: --';
    return;
  }

  // Map landmarks by handedness
  const handMap = {};
  results.multiHandLandmarks.forEach((lm, i) => {
    handMap[results.multiHandedness[i].label] = lm;
  });

  const numHands = Object.keys(handMap).length;
  const fingers = {};
  const now = Date.now();

  for (const [side, lm] of Object.entries(handMap)) {
    const th = lm[THUMB_TIP], ix = lm[INDEX_TIP];
    fingers[side] = {
      thumb: { x: (1 - th.x) * canvas.width, y: th.y * canvas.height },
      index: { x: (1 - ix.x) * canvas.width, y: ix.y * canvas.height },
      dist: Math.hypot(th.x - ix.x, th.y - ix.y),
    };
  }

  // Pinch detection → mode switch
  for (const [side, f] of Object.entries(fingers)) {
    const pinching = f.dist < PINCH_THRESHOLD;
    const wasLeft = leftPinching, wasRight = rightPinching;
    if (side === 'Left') {
      if (pinching && !leftPinching && now - lastPinchTime > COOLDOWN) {
        triggerModeSwitch(); lastPinchTime = now;
      }
      leftPinching = pinching;
    } else {
      if (pinching && !rightPinching && now - lastPinchTime > COOLDOWN) {
        triggerModeSwitch(); lastPinchTime = now;
      }
      rightPinching = pinching;
    }
  }

  // Collect all 4 finger tip positions for bounding rect
  const pts = [];
  for (const f of Object.values(fingers)) pts.push(f.thumb, f.index);

  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const rx = Math.min(...xs), ry = Math.min(...ys);
  const rw = Math.max(...xs) - rx, rh = Math.max(...ys) - ry;

  if (rw > 20 && rh > 20 && MODES[currentMode].id !== 'ORIGINAL') {
    applyROIEffect(rx, ry, rw, rh);
  }

  if (rw > 10 && rh > 10) drawROIOverlay(rx, ry, rw, rh);

  // Draw finger dots
  for (const [side, f] of Object.entries(fingers)) {
    const isPinch = side === 'Left' ? leftPinching : rightPinching;
    const col = side === 'Left' ? '#00e5ff' : '#39ff14';
    drawDot(f.thumb, col, isPinch);
    drawDot(f.index, col, isPinch);
    if (isPinch) drawPinchRipple(f.thumb, f.index, col);
  }

  const lSt = fingers.Left  ? (leftPinching  ? '<span style="color:#00e5ff">PINCH ✦</span>' : 'OPEN') : '--';
  const rSt = fingers.Right ? (rightPinching ? '<span style="color:#39ff14">PINCH ✦</span>' : 'OPEN') : '--';
  infoEl.innerHTML = `HANDS: ${numHands}/2<br>L: ${lSt}<br>R: ${rSt}`;
}

function triggerModeSwitch() {
  currentMode = (currentMode + 1) % MODES.length;
  buildModeBar();
  // Flash overlay
  const m = MODES[currentMode];
  ctx.fillStyle = `rgba(${m.rgb},0.12)`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

// ─── ROI Effect dispatcher ───────────────────────────────────────────────────
function applyROIEffect(rx, ry, rw, rh) {
  const x = Math.max(0, Math.floor(rx));
  const y = Math.max(0, Math.floor(ry));
  const w = Math.min(canvas.width  - x, Math.ceil(rw));
  const h = Math.min(canvas.height - y, Math.ceil(rh));
  if (w < 4 || h < 4) return;

  const id = ctx.getImageData(x, y, w, h);
  const d  = id.data;

  if (MODES[currentMode].id === 'AI_ANIME') {
    ctx.putImageData(id, x, y); // restore video pixels first
    // Paint last cached AI result immediately — eliminates flicker
    if (aiLastResult && aiLastROI.w > 0) {
      ctx.drawImage(aiLastResult, 0, 0, AI_SIZE, AI_SIZE,
                    aiLastROI.x, aiLastROI.y, aiLastROI.w, aiLastROI.h);
    }
    applyAIAnime(x, y, w, h); // async update in background
    return;
  }

  switch (MODES[currentMode].id) {
    case 'WEBTOON': applyWebtoon(d, w, h); break;
    case 'MANGA':   applyManga(d, w, h);   break;
    case 'CARTOON': applyCartoon(d, w, h); break;
    case 'SKETCH':  applySketch(d, w, h);  break;
    case 'NEON':    applyNeon(d, w, h);    break;
    case 'THERMAL': applyThermal(d, w, h); break;
    case 'GLITCH':  applyGlitch(d, w, h);  break;
  }
  ctx.putImageData(id, x, y);
}

// ─── Effect helpers ───────────────────────────────────────────────────────────
function lum(r, g, b) { return 0.299*r + 0.587*g + 0.114*b; }

function grayArray(data, n) {
  const g = new Float32Array(n);
  for (let i = 0; i < n; i++) g[i] = lum(data[i*4], data[i*4+1], data[i*4+2]);
  return g;
}

function boxBlur(gray, w, h, r) {
  const tmp = new Float32Array(w * h);
  // horizontal
  for (let y = 0; y < h; y++) {
    let s = 0, cnt = 0;
    for (let x = 0; x <= r && x < w; x++) { s += gray[y*w+x]; cnt++; }
    for (let x = 0; x < w; x++) {
      tmp[y*w+x] = s / cnt;
      if (x - r >= 0) { s -= gray[y*w+(x-r)]; cnt--; }
      if (x+r+1 < w)  { s += gray[y*w+(x+r+1)]; cnt++; }
    }
  }
  // vertical
  const out = new Float32Array(w * h);
  for (let x = 0; x < w; x++) {
    let s = 0, cnt = 0;
    for (let y = 0; y <= r && y < h; y++) { s += tmp[y*w+x]; cnt++; }
    for (let y = 0; y < h; y++) {
      out[y*w+x] = s / cnt;
      if (y - r >= 0) { s -= tmp[(y-r)*w+x]; cnt--; }
      if (y+r+1 < h)  { s += tmp[(y+r+1)*w+x]; cnt++; }
    }
  }
  return out;
}

function sobel(gray, w, h) {
  const mag = new Float32Array(w * h);
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const tl=gray[(y-1)*w+(x-1)], tm=gray[(y-1)*w+x], tr=gray[(y-1)*w+(x+1)];
      const ml=gray[y*w+(x-1)],                          mr=gray[y*w+(x+1)];
      const bl=gray[(y+1)*w+(x-1)], bm=gray[(y+1)*w+x], br=gray[(y+1)*w+(x+1)];
      const gx = -tl - 2*ml - bl + tr + 2*mr + br;
      const gy = -tl - 2*tm - tr + bl + 2*bm + br;
      mag[y*w+x] = Math.sqrt(gx*gx + gy*gy);
    }
  }
  return mag;
}

// ─── Channel-wise blur helper ────────────────────────────────────────────────
function boxBlurChannel(data, w, h, r, ch) {
  const c = new Float32Array(w * h);
  for (let i = 0; i < w * h; i++) c[i] = data[i * 4 + ch];
  return boxBlur(c, w, h, r);
}

// WEBTOON: edge-preserving smooth + posterize + saturation boost + bold outlines
function applyWebtoon(d, w, h) {
  const n = w * h;

  // Edge detection on original before we modify d
  const origGray = grayArray(d, n);
  const edges = sobel(boxBlur(origGray, w, h, 1), w, h);

  // Smooth each channel (two passes = approx Gaussian, preserves edges via blending)
  const r1 = boxBlur(boxBlurChannel(d, w, h, 5, 0), w, h, 3);
  const g1 = boxBlur(boxBlurChannel(d, w, h, 5, 1), w, h, 3);
  const b1 = boxBlur(boxBlurChannel(d, w, h, 5, 2), w, h, 3);

  const step = 51; // 5 posterize levels (0,51,102,153,204,255)

  for (let i = 0; i < n; i++) {
    const idx = i * 4;

    // Quantize blurred channels
    let r = Math.round(r1[i] / step) * step;
    let g = Math.round(g1[i] / step) * step;
    let b = Math.round(b1[i] / step) * step;

    // Saturation boost (flat-color webtoon look)
    const l = lum(r, g, b);
    const sat = 1.7;
    r = Math.min(255, Math.max(0, l + (r - l) * sat));
    g = Math.min(255, Math.max(0, l + (g - l) * sat));
    b = Math.min(255, Math.max(0, l + (b - l) * sat));

    // Bold black outlines
    if (edges[i] > 16) {
      const s = Math.min(1, (edges[i] - 16) / 65) * 0.96;
      r *= (1 - s); g *= (1 - s); b *= (1 - s);
    }

    d[idx] = r; d[idx+1] = g; d[idx+2] = b;
  }
}

// MANGA: grayscale + 5-zone screen tone patterns + ink outlines
function applyManga(d, w, h) {
  const n = w * h;
  const gray = grayArray(d, n);
  const edges = sobel(boxBlur(gray, w, h, 1), w, h);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = y * w + x;
      const idx = i * 4;
      const g = gray[i];
      const e = edges[i];
      let val;

      if (e > 20) {
        // Ink outline: Sobel strength → black line
        val = Math.max(0, 255 - e * 2.5);
      } else if (g < 55) {
        // Dense shadow: tight diagonal screen tone
        val = ((x - y + 9999) % 3 === 0) ? 100 : 10;
      } else if (g < 115) {
        // Mid-shadow: regular diagonal screen tone
        val = ((x + y) % 4 < 2) ? 55 : 185;
      } else if (g < 175) {
        // Midtone: sparse dot pattern
        val = (x % 5 === 2 && y % 5 === 2) ? 70 : 235;
      } else if (g < 225) {
        // Light: very sparse dot pattern
        val = (x % 8 === 0 && y % 8 === 0) ? 155 : 255;
      } else {
        // Highlight: clean white
        val = 255;
      }

      d[idx] = d[idx+1] = d[idx+2] = val;
    }
  }
}

// CARTOON: quantize colors + darken edges
function applyCartoon(d, w, h) {
  const n = w * h;
  const gray = grayArray(d, n);
  const blurred = boxBlur(gray, w, h, 2);
  const edges = sobel(blurred, w, h);
  const step = 40; // quantization step
  for (let i = 0; i < n; i++) {
    const idx = i*4;
    d[idx]   = Math.round(d[idx]   / step) * step;
    d[idx+1] = Math.round(d[idx+1] / step) * step;
    d[idx+2] = Math.round(d[idx+2] / step) * step;
    if (edges[i] > 25) {
      const s = Math.min(1, edges[i] / 100) * 0.85;
      d[idx]   = d[idx]   * (1-s);
      d[idx+1] = d[idx+1] * (1-s);
      d[idx+2] = d[idx+2] * (1-s);
    }
  }
}

// SKETCH: grayscale pencil-line color-dodge technique
function applySketch(d, w, h) {
  const n = w * h;
  const gray = grayArray(d, n);
  const invGray = new Float32Array(n);
  for (let i = 0; i < n; i++) invGray[i] = 255 - gray[i];
  const blurred = boxBlur(invGray, w, h, 9);

  for (let i = 0; i < n; i++) {
    const idx = i*4;
    const g = gray[i], b = blurred[i];
    const dodge = b >= 254 ? 255 : Math.min(255, (g * 255) / (255 - b));
    d[idx] = d[idx+1] = d[idx+2] = dodge;
  }
}

// NEON: dark background + glowing colored edges
function applyNeon(d, w, h) {
  const n = w * h;
  const gray = boxBlur(grayArray(d, n), w, h, 1);
  const edges = sobel(gray, w, h);
  let maxE = 1;
  for (let i = 0; i < n; i++) if (edges[i] > maxE) maxE = edges[i];

  for (let i = 0; i < n; i++) {
    const idx = i*4;
    const t = Math.pow(edges[i] / maxE, 0.7);
    if (t < 0.12) {
      d[idx] = d[idx+1] = d[idx+2] = 0;
    } else {
      const r = d[idx], g = d[idx+1], b = d[idx+2];
      const l = lum(r, g, b) || 1;
      const sat = 4;
      d[idx]   = Math.min(255, ((r - l) * sat + l) * t * 2.5);
      d[idx+1] = Math.min(255, ((g - l) * sat + l) * t * 2.5);
      d[idx+2] = Math.min(255, ((b - l) * sat + l) * t * 2.5);
    }
  }
}

// Thermal LUT
const THERMAL_LUT = (() => {
  const lut = new Uint8Array(256*3);
  const stops = [
    [0,0,0,0],[50,0,0,160],[110,0,200,210],
    [160,0,230,60],[200,240,230,0],[230,255,80,0],[255,255,255,255]
  ];
  for (let v = 0; v < 256; v++) {
    let a, b;
    for (let s = 0; s < stops.length-1; s++) {
      if (v >= stops[s][0] && v <= stops[s+1][0]) { a=stops[s]; b=stops[s+1]; break; }
    }
    if (!a) { a=b=stops[stops.length-1]; }
    const t = a[0]===b[0] ? 0 : (v-a[0])/(b[0]-a[0]);
    lut[v*3]   = a[1]+(b[1]-a[1])*t;
    lut[v*3+1] = a[2]+(b[2]-a[2])*t;
    lut[v*3+2] = a[3]+(b[3]-a[3])*t;
  }
  return lut;
})();

function applyThermal(d, w, h) {
  const n = w*h;
  for (let i = 0; i < n; i++) {
    const idx = i*4;
    const v = Math.round(lum(d[idx], d[idx+1], d[idx+2]));
    d[idx]   = THERMAL_LUT[v*3];
    d[idx+1] = THERMAL_LUT[v*3+1];
    d[idx+2] = THERMAL_LUT[v*3+2];
  }
}

// PIXEL: block averaging
function applyPixel(d, w, h) {
  const bs = 12;
  for (let by = 0; by < h; by += bs) {
    for (let bx = 0; bx < w; bx += bs) {
      const x1 = Math.min(bx+bs, w), y1 = Math.min(by+bs, h);
      let r=0,g=0,b=0,c=0;
      for (let y=by;y<y1;y++) for (let x=bx;x<x1;x++) {
        const i=(y*w+x)*4; r+=d[i];g+=d[i+1];b+=d[i+2];c++;
      }
      r/=c;g/=c;b/=c;
      for (let y=by;y<y1;y++) for (let x=bx;x<x1;x++) {
        const i=(y*w+x)*4; d[i]=r;d[i+1]=g;d[i+2]=b;
      }
    }
  }
}

// GLITCH: horizontal slice offset + RGB channel shift
function applyGlitch(d, w, h) {
  const copy = new Uint8ClampedArray(d);
  const seed = frameCount;
  function prng(n) { let x=Math.sin(n)*10000; return x-Math.floor(x); }
  const slices = 6 + Math.floor(prng(seed)*8);
  for (let s=0; s<slices; s++) {
    const sy   = Math.floor(prng(seed*7+s*3)*h);
    const sh   = 2 + Math.floor(prng(seed*3+s*7)*22);
    const offX = Math.floor((prng(seed*11+s)-0.5)*50);
    const ch   = Math.floor(prng(seed*5+s)*3);
    for (let y=sy; y<Math.min(sy+sh,h); y++) {
      for (let x=0; x<w; x++) {
        const srcX = ((x-offX)%w+w)%w;
        const di = (y*w+x)*4, si = (y*w+srcX)*4;
        d[di+ch] = copy[si+ch];
      }
    }
  }
  // blue channel shift right
  const shift = 4;
  for (let i = w*h-1; i >= shift; i--) d[i*4+2] = copy[(i-shift)*4+2];
}

// ─── Drawing helpers ──────────────────────────────────────────────────────────
function drawROIOverlay(rx, ry, rw, rh) {
  const m = MODES[currentMode];
  ctx.save();
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = m.color;
  ctx.shadowBlur = 10;
  ctx.setLineDash([5, 4]);
  ctx.strokeRect(rx, ry, rw, rh);
  ctx.setLineDash([]);

  // Corner ticks
  ctx.lineWidth = 2.5; ctx.shadowBlur = 14;
  const tl = 14;
  const corners = [[rx,ry,1,1],[rx+rw,ry,-1,1],[rx,ry+rh,1,-1],[rx+rw,ry+rh,-1,-1]];
  corners.forEach(([cx,cy,dx,dy]) => {
    ctx.beginPath();
    ctx.moveTo(cx, cy); ctx.lineTo(cx+dx*tl, cy);
    ctx.moveTo(cx, cy); ctx.lineTo(cx, cy+dy*tl);
    ctx.stroke();
  });

  // Mode label
  ctx.font = '8px Courier New';
  ctx.fillStyle = m.color;
  ctx.shadowBlur = 6;
  ctx.fillText(`[ ${m.id} ]`, rx + 5, ry - 4);

  // Dimensions readout
  ctx.fillStyle = `rgba(${m.rgb}, 0.55)`;
  ctx.font = '7px Courier New';
  ctx.fillText(`${Math.round(rw)}×${Math.round(rh)}`, rx + rw - 50, ry + rh + 10);

  ctx.restore();
}

function drawDot(pos, color, pinching) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, pinching ? 7 : 5, 0, Math.PI*2);
  ctx.fillStyle = pinching ? color : 'transparent';
  ctx.strokeStyle = color;
  ctx.lineWidth = pinching ? 2 : 1.5;
  ctx.shadowColor = color;
  ctx.shadowBlur = pinching ? 20 : 10;
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawPinchRipple(thumb, index, color) {
  const mx = (thumb.x + index.x) / 2;
  const my = (thumb.y + index.y) / 2;
  const t  = (Date.now() % 700) / 700;
  ctx.save();
  ctx.beginPath();
  ctx.arc(mx, my, 6 + t*22, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(${hexRgb(color)}, ${(1-t)*0.9})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.restore();
}

function hexRgb(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ─── AI ANIME (@magenta/image + TF.js 0.14.1) ────────────────────────────────
let aiNet = null;
let aiStyleCanvas = null;
let aiStyleVec = null;       // pre-computed style vector (computed once)
let aiState = 'idle';        // idle | loading | ready | error
let aiFrameActive = false;
let aiLastResult = null;     // cached result canvas — drawn every frame to prevent flicker
let aiLastROI = {x:0,y:0,w:0,h:0};

function buildAnimeStyleCanvas() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const cx = c.getContext('2d');

  // Sky-blue background (anime sky)
  const sky = cx.createLinearGradient(0, 0, 0, 256);
  sky.addColorStop(0, '#b8e4f9');
  sky.addColorStop(1, '#e8f8ff');
  cx.fillStyle = sky; cx.fillRect(0, 0, 256, 256);

  // Large flat face shape (warm skin, anime palette)
  cx.fillStyle = '#f5c9a0';
  cx.beginPath(); cx.ellipse(128, 155, 72, 85, 0, 0, Math.PI*2); cx.fill();
  cx.strokeStyle = '#1a1020'; cx.lineWidth = 5; cx.stroke();

  // Hair — solid dark, hard edge
  cx.fillStyle = '#1c0e33';
  cx.beginPath();
  cx.moveTo(55, 120); cx.quadraticCurveTo(128, 20, 201, 120);
  cx.quadraticCurveTo(215, 80, 200, 60); cx.quadraticCurveTo(128, 0, 56, 60);
  cx.quadraticCurveTo(41, 80, 55, 120);
  cx.fill(); cx.stroke();

  // Highlight streak in hair
  cx.fillStyle = '#5c3b8a';
  cx.beginPath(); cx.ellipse(155, 68, 18, 8, -0.4, 0, Math.PI*2); cx.fill();

  // Eyes — oversized anime eyes
  [ [92, 138], [164, 138] ].forEach(([ex, ey]) => {
    // Iris (jewel-green)
    cx.fillStyle = '#4ecdc4';
    cx.beginPath(); cx.ellipse(ex, ey, 16, 20, 0, 0, Math.PI*2); cx.fill();
    cx.strokeStyle = '#1a1020'; cx.lineWidth = 3; cx.stroke();
    // Pupil
    cx.fillStyle = '#110a22';
    cx.beginPath(); cx.ellipse(ex, ey+2, 9, 13, 0, 0, Math.PI*2); cx.fill();
    // Specular
    cx.fillStyle = '#ffffff';
    cx.beginPath(); cx.ellipse(ex+5, ey-5, 4, 5, 0.5, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(ex-4, ey+4, 2, 0, Math.PI*2); cx.fill();
    // Upper eyelash
    cx.strokeStyle = '#1a1020'; cx.lineWidth = 3;
    cx.beginPath(); cx.ellipse(ex, ey-4, 17, 8, 0, Math.PI, Math.PI*2); cx.stroke();
  });

  // Nose (minimal — two small dots)
  cx.fillStyle = '#c8906a';
  cx.beginPath(); cx.ellipse(122, 166, 3, 2, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(134, 166, 3, 2, 0, 0, Math.PI*2); cx.fill();

  // Lips (pink, simple)
  cx.fillStyle = '#ff8fa3';
  cx.beginPath(); cx.ellipse(128, 183, 18, 7, 0, 0, Math.PI*2); cx.fill();
  cx.strokeStyle = '#c45c72'; cx.lineWidth = 1.5; cx.stroke();

  // Neck
  cx.fillStyle = '#f5c9a0';
  cx.beginPath(); cx.rect(110, 228, 36, 28); cx.fill();
  cx.strokeStyle = '#1a1020'; cx.lineWidth = 4;
  cx.beginPath(); cx.moveTo(110, 228); cx.lineTo(110, 256); cx.stroke();
  cx.beginPath(); cx.moveTo(146, 228); cx.lineTo(146, 256); cx.stroke();

  // Blush
  cx.fillStyle = 'rgba(255,120,140,0.25)';
  cx.beginPath(); cx.ellipse(78, 168, 22, 12, 0, 0, Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(178, 168, 22, 12, 0, 0, Math.PI*2); cx.fill();

  return c;
}

async function loadAIModels() {
  if (aiState !== 'idle') return;
  aiState = 'loading';
  statusEl.textContent = 'AI MODEL LOADING (~30s)...';
  try {
    // mi = window.mi from @magenta/image bundle
    aiNet = new mi.ArbitraryStyleTransferNetwork();
    await aiNet.initialize();
    aiStyleCanvas = buildAnimeStyleCanvas();
    // Pre-compute style vector once — reused every frame
    aiStyleVec = aiNet.predictStyleParameters(aiStyleCanvas);
    aiState = 'ready';
    statusEl.textContent = 'AI ANIME READY';
  } catch (e) {
    aiState = 'error';
    const msg = e && e.message ? e.message.slice(0, 80) : String(e);
    statusEl.textContent = 'AI FAIL: ' + msg;
    console.error('AI load error:', e);
  }
}

const AI_SIZE = 256;
const aiOffCanvas = document.createElement('canvas');
aiOffCanvas.width = aiOffCanvas.height = AI_SIZE;
const aiOffCtx = aiOffCanvas.getContext('2d');

async function applyAIAnime(x, y, w, h) {
  if (aiFrameActive) return;
  if (aiState === 'idle') { loadAIModels(); return; }
  if (aiState !== 'ready') return;

  aiFrameActive = true;
  try {
    // Snapshot current ROI into offscreen canvas
    aiOffCtx.drawImage(canvas, x, y, w, h, 0, 0, AI_SIZE, AI_SIZE);

    // Use pre-computed style vector — skip style prediction every frame
    const stylized = aiNet.produceStylized(aiOffCanvas, aiStyleVec);
    const bytes = await mi.tf.toPixels(stylized);
    stylized.dispose();

    const imageData = new ImageData(bytes, AI_SIZE, AI_SIZE);

    // Cache result for flicker-free display
    if (!aiLastResult) {
      aiLastResult = document.createElement('canvas');
      aiLastResult.width = aiLastResult.height = AI_SIZE;
    }
    aiLastResult.getContext('2d').putImageData(imageData, 0, 0);
    aiLastROI = {x, y, w, h};

    ctx.drawImage(aiLastResult, 0, 0, AI_SIZE, AI_SIZE, x, y, w, h);
  } catch (e) {
    console.warn('AI frame error:', e);
  } finally {
    aiFrameActive = false;
  }
}

function drawHint(msg) {
  ctx.save();
  ctx.font = '10px Courier New';
  ctx.fillStyle = 'rgba(0,229,255,0.28)';
  ctx.textAlign = 'center';
  ctx.fillText(msg, canvas.width/2, canvas.height - 28);
  ctx.textAlign = 'left';
  ctx.restore();
}
